name: Release Windows x64

on:
  workflow_dispatch: # ručno iz Actions taba
  push:
    tags:
      - 'v*' # ili tag npr. v0.1.0

jobs:
  release:
    runs-on: windows-latest # x64 host -> x64 build
    permissions:
      contents: write # treba za kreiranje GitHub Release-a
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 25.9.0 # poravnato s lokalnim node-om

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install deps
        run: npm ci

      # Builda x64, potpisuje updater artifacte, kreira Release i latest.json
      - uses: tauri-apps/tauri-action@1ddc7b49b13c3038297360482fcb3e058764d7c9 # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__ # __VERSION__ se zamijeni s verzijom iz tauri.conf.json
          releaseName: 'Zzlepuh v__VERSION__'
          releaseDraft: false
          prerelease: false
          args: --target x86_64-pc-windows-msvc
