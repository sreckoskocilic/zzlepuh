name: Release Windows x64

on:
  workflow_dispatch: # ručno iz Actions taba
  push:
    tags:
      - 'v*' # ili tag npr. v0.1.0

jobs:
  release:
    runs-on: windows-latest # x64 host -> x64 build
    permissions:
      contents: write # treba za kreiranje GitHub Release-a
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 25.9.0 # poravnato s lokalnim node-om

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Cache cargo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          # Version bumps change Cargo.lock's hash → exact key misses every release.
          # Fall back to the newest prior cargo cache so deps + target are reused.
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install deps
        run: npm ci

      # Builda x64, potpisuje updater artifacte, kreira Release i latest.json
      - uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__ # __VERSION__ se zamijeni s verzijom iz tauri.conf.json
          releaseName: 'Zzlepuh v__VERSION__'
          releaseDraft: false
          prerelease: false
          args: --target x86_64-pc-windows-msvc
